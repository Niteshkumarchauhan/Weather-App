<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
  </defs>
  <!-- Sun -->
  <circle cx="38" cy="38" r="16" fill="url(#sunGrad)"/>
  <!-- Sun rays -->
  <g stroke="#fbbf24" stroke-width="3" stroke-linecap="round">
    <line x1="38" y1="16" x2="38" y2="10"/>
    <line x1="38" y1="60" x2="38" y2="66"/>
    <line x1="16" y1="38" x2="10" y2="38"/>
    <line x1="60" y1="38" x2="66" y2="38"/>
    <line x1="23" y1="23" x2="18" y2="18"/>
    <line x1="53" y1="53" x2="58" y2="58"/>
    <line x1="53" y1="23" x2="58" y2="18"/>
    <line x1="23" y1="53" x2="18" y2="58"/>
  </g>
  <!-- Cloud -->
  <ellipse cx="62" cy="65" rx="22" ry="14" fill="url(#cloudGrad)"/>
  <ellipse cx="48" cy="68" rx="14" ry="11" fill="url(#cloudGrad)"/>
  <ellipse cx="72" cy="68" rx="12" ry="10" fill="url(#cloudGrad)"/>
  <ellipse cx="60" cy="56" rx="14" ry="12" fill="url(#cloudGrad)"/>
</svg>
